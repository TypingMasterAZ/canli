<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <title>Canlı Oyunlar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #2563eb, #1e40af);
      padding: 18px;
    }

    .header-content {
      max-width: 1200px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
    }

    header input {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
      width: 220px;
    }

    /* MATCH LIST */
    main {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 14px;
    }

    #matchList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .match-card {
      background: #020617;
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }

    .match-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0,0,0,.4);
    }

    .teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .team {
      width: 40%;
      text-align: center;
    }

    .team img {
      width: 46px;
      height: 46px;
      object-fit: contain;
      margin-bottom: 6px;
    }

    .team-name {
      font-size: 13px;
      font-weight: 600;
    }

    .score {
      font-size: 22px;
      font-weight: 700;
    }

    .meta {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      opacity: .8;
    }

    /* MODAL */
    #detailsModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 1000;
      overflow-y: auto;
    }

    .modal-box {
      background: #020617;
      max-width: 900px;
      margin: 40px auto;
      border-radius: 18px;
      padding: 20px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn {
      font-size: 26px;
      cursor: pointer;
    }

    .modal-teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px 0;
    }

    .modal-team {
      width: 40%;
      text-align: center;
    }

    .modal-team img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      margin-bottom: 8px;
    }

    .modal-score {
      font-size: 32px;
      font-weight: 700;
    }

    .section {
      margin-top: 20px;
      background: #020617;
      border-radius: 14px;
      padding: 14px;
    }

    .section h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }

    /* SCROLL BLOK */
    body:has(#detailsModal[style*="block"]) {
      overflow: hidden;
    }
  </style>
</head>

<body>

<header>
  <div class="header-content">
    <h1>⚽ Canlı Oyunlar</h1>
    <input id="searchInput" type="text" placeholder="Komanda axtar..." />
  </div>
</header>

<main>
  <div id="matchList"></div>
</main>

<!-- MODAL -->
<div id="detailsModal">
  <div class="modal-box">

    <div class="modal-header">
      <div>
        <div id="leagueM"></div>
        <div id="timeM"></div>
      </div>
      <span class="close-btn" onclick="closeModal()">×</span>
    </div>

    <div class="modal-teams">
      <div class="modal-team">
        <img id="logoH" src="" alt="">
        <div id="nameH"></div>
      </div>

      <div class="modal-score" id="scoreM"></div>

      <div class="modal-team">
        <img id="logoA" src="" alt="">
        <div id="nameA"></div>
      </div>
    </div>

    <div class="section">
      <h3>⚽ Qollar</h3>
      <div id="goalsBox"></div>
    </div>

    <div class="section">
      <h3>📊 Statistika</h3>
      <div id="statsBox"></div>
    </div>

  </div>
</div>

<script>
  <!-- SCRIPTI BURAYA EYNİ CÜR YAPIŞDIR (DƏYİŞMƏ) -->
</script>

</body>
</html>
