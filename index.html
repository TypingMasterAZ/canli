<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProScore Elite | Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617; --card: rgba(15, 23, 42, 0.9);
            --red: #f43f5e; --text: #f8fafc;
            --muted: #94a3b8; --border: rgba(255, 255, 255, 0.08); --accent: #38bdf8;
        }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }
        header { background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(12px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .container { padding: 10px; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
        .match-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .match-body { display: flex; align-items: center; justify-content: space-between; }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .team-logo { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        .team-name { font-weight: 700; font-size: 12px; color: var(--text); height: 35px; overflow: hidden; }
        .score-area { flex: 0 0 80px; text-align: center; }
        .score { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .minute { font-size: 10px; padding: 3px 10px; border-radius: 20px; background: var(--red); color: #fff; font-weight: 800; }
        .league-name { text-align: center; font-size: 9px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; opacity: 0.8; }
        .goals { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: flex; font-size: 10px; color: var(--muted); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; font-size: 18px;">PRO<span style="color:var(--accent)">SCORE</span></div>
    <button onclick="fetchData()" style="background:var(--accent); border:none; padding:5px 15px; border-radius:8px; font-weight:800; cursor:pointer">YENİLƏ</button>
</header>

<div class="container" id="matchContainer">
    <div style="text-align:center; padding:50px;">Yüklənir...</div>
</div>

<script>
    const API_URL = "https://canli-neticeler.onrender.com";

    async function fetchData() {
        try {
            const res = await fetch(`${API_URL}/live-scores`);
            const data = await res.json();
            renderMatches(data);
        } catch (e) {
            document.getElementById("matchContainer").innerHTML = "Xəta baş verdi.";
        }
    }

    function renderMatches(matches) {
        const container = document.getElementById("matchContainer");
        if (!matches || matches.length === 0) {
            container.innerHTML = "<div style='text-align:center'>Oyun tapılmadı.</div>";
            return;
        }

        container.innerHTML = matches.map(m => {
            // Təmizlənmiş komanda adı (Loqo axtarışı üçün)
            const cleanName = (name) => name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
            
            // 1. GitHub Arxiv Loqosu
            const logo1 = `https://raw.githubusercontent.com/lucasbento/football-logos/master/logos/teams/${m.home.replace(/\s/g, '%20')}/logo.png`;
            const logo2 = `https://raw.githubusercontent.com/lucasbento/football-logos/master/logos/teams/${m.away.replace(/\s/g, '%20')}/logo.png`;
            
            // Fallback (Hərflər)
            const fb = (n) => `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}&background=1e293b&color=38bdf8&bold=true`;

            return `
                <div class="match-card">
                    <div class="league-name">${m.league}</div>
                    <div class="match-body">
                        <div class="team-side">
                            <img src="${logo1}" class="team-logo" 
                                 onerror="this.onerror=null; this.src='https://www.thesportsdb.com/images/media/team/badge/small/${encodeURIComponent(m.home)}.png'; this.onerror=function(){this.src='${fb(m.home)}'};">
                            <div class="team-name">${m.home}</div>
                        </div>
                        <div class="score-area">
                            <div class="score">${m.score.home} - ${m.score.away}</div>
                            <div class="minute">${m.minute}</div>
                        </div>
                        <div class="team-side">
                            <img src="${logo2}" class="team-logo" 
                                 onerror="this.onerror=null; this.src='https://www.thesportsdb.com/images/media/team/badge/small/${encodeURIComponent(m.away)}.png'; this.onerror=function(){this.src='${fb(m.away)}'};">
                            <div class="team-name">${m.away}</div>
                        </div>
                    </div>
                    ${m.scorers && m.scorers.length > 0 ? `
                        <div class="goals">
                            <div style="flex:1">${m.scorers.filter(s => s.side === 1).map(s => `⚽ ${s.name} ${s.time}'`).join("<br>")}</div>
                            <div style="flex:1; text-align:right">${m.scorers.filter(s => s.side === 2).map(s => `${s.name} ${s.time}' ⚽`).join("<br>")}</div>
                        </div>
                    ` : ''}
                </div>
            `;
        }).join("");
    }

    fetchData();
    setInterval(fetchData, 45000);
</script>
</body>
</html>
