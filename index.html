<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProScore Elite | 100% Real Logos</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: #0f172a; --accent: #38bdf8; --red: #f43f5e; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; }
        header { padding: 15px 20px; background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .container { padding: 15px; max-width: 550px; margin: 0 auto; }
        .match-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .match-body { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .team { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .logo-box { width: 55px; height: 55px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .team-logo { width: 100%; height: 100%; object-fit: contain; }
        .score-box { text-align: center; flex: 0 0 100px; }
        .score { font-size: 32px; font-weight: 800; }
        .minute { font-size: 10px; background: var(--red); padding: 4px 12px; border-radius: 20px; font-weight: 800; }
        .league { font-size: 9px; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; font-weight: 800; text-align: center; opacity: 0.7; }
        .scorers { margin-top: 15px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px; font-weight: 800;">PRO<span style="color:var(--accent)">SCORE</span></div>
    <button onclick="fetchData()" style="background:var(--accent); border:none; padding:8px 16px; border-radius:10px; font-weight:800; cursor:pointer;">YENİLƏ</button>
</header>

<div class="container" id="matchList"></div>

<script>
    const API_URL = "https://canli-neticeler.onrender.com";

    async function fetchData() {
        try {
            const res = await fetch(`${API_URL}/live-scores`);
            const data = await res.json();
            render(data);
        } catch (e) { console.error(e); }
    }

    function render(matches) {
        const list = document.getElementById("matchList");
        list.innerHTML = matches.map(m => {
            // PEŞƏKAR LOQO SİSTEMİ (ID-yə əsaslanan)
            // Livescore ID-ləri əksər hallarda Sofascore və FootyStats ilə eynidir.
            const logoUrl = (id) => `https://api.sofascore.app/api/v1/team/${id}/image`;
            
            // Əgər ID ilə tapılmasa, adla TheSportsDB-dən yoxla
            const backupLogo = (name) => `https://www.thesportsdb.com/images/media/team/badge/small/${encodeURIComponent(name)}.png`;
            const fallback = (name) => `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=38bdf8&color=fff&bold=true`;

            return `
                <div class="match-card">
                    <div class="league">${m.league}</div>
                    <div class="match-body">
                        <div class="team">
                            <div class="logo-box">
                                <img src="${logoUrl(m.homeId)}" class="team-logo" 
                                     onerror="this.onerror=null; this.src='${backupLogo(m.home)}'; this.onerror=function(){this.src='${fallback(m.home)}'};">
                            </div>
                            <div style="font-size: 13px; font-weight: 700;">${m.home}</div>
                        </div>
                        <div class="score-box">
                            <div class="score">${m.score.home} - ${m.score.away}</div>
                            <div class="minute">${m.minute}</div>
                        </div>
                        <div class="team">
                            <div class="logo-box">
                                <img src="${logoUrl(m.awayId)}" class="team-logo" 
                                     onerror="this.onerror=null; this.src='${backupLogo(m.away)}'; this.onerror=function(){this.src='${fallback(m.away)}'};">
                            </div>
                            <div style="font-size: 13px; font-weight: 700;">${m.away}</div>
                        </div>
                    </div>
                    ${m.scorers.length > 0 ? `
                        <div class="scorers">
                            <div>${m.scorers.filter(s => s.side === 1).map(s => `⚽ ${s.name} ${s.time}'`).join("<br>")}</div>
                            <div style="text-align:right">${m.scorers.filter(s => s.side === 2).map(s => `${s.name} ${s.time}' ⚽`).join("<br>")}</div>
                        </div>
                    ` : ''}
                </div>
            `;
        }).join("");
    }

    fetchData();
    setInterval(fetchData, 45000);
</script>
</body>
</html>
