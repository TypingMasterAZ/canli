<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>ProScore Elite | Live Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
    --bg: #0b1220;
    --card: #111a2e;
    --primary: #2563eb;
    --accent: #38bdf8;
    --live: #ef4444;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --border: rgba(255,255,255,0.08);
    --glass: rgba(255,255,255,0.04);
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg, #0b1220, #020617);
    color: var(--text);
}

/* HEADER */
header {
    background: rgba(2,6,23,0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.header-content {
    max-width: 620px;
    margin: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-content button {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border: none;
    color: white;
    padding: 7px 18px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
}

/* CONTAINER */
.container {
    max-width: 620px;
    margin: auto;
    padding: 14px;
}

/* LEAGUE */
.league-group {
    margin-top: 18px;
    background: var(--card);
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid var(--border);
}

.league-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 15px;
    background: linear-gradient(90deg, rgba(37,99,235,0.15), transparent);
}

.league-header img {
    width: 20px;
    height: 20px;
}

.league-title {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--muted);
}

/* MATCH CARD */
.match-card {
    display: flex;
    padding: 14px 16px;
    gap: 12px;
    cursor: pointer;
    position: relative;
    transition: 0.25s ease;
}

.match-card:not(:last-child) {
    border-bottom: 1px solid var(--border);
}

.match-card:hover {
    background: var(--glass);
}

.match-card::after {
    content: "›";
    position: absolute;
    right: 16px;
    font-size: 26px;
    color: var(--muted);
}

/* TIME */
.time-col {
    font-size: 11px;
    font-weight: 900;
    color: var(--live);
    min-width: 42px;
}

/* TEAMS */
.teams-col {
    flex: 1;
    padding-right: 30px;
}

.team-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 6px 0;
}

.team-info {
    display: flex;
    align-items: center;
    gap: 10px;
}

.team-logo {
    width: 22px;
    height: 22px;
    background: white;
    padding: 3px;
    border-radius: 6px;
}

.team-name {
    font-size: 13px;
    font-weight: 600;
}

.score-val {
    font-size: 16px;
    font-weight: 900;
    color: var(--accent);
}

/* MODAL */
#detailsModal {
    display: none;
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #020617, #020617);
    z-index: 2000;
    overflow-y: auto;
}

/* MODAL HEADER */
.modal-header {
    padding: 30px 15px 25px;
    text-align: center;
    background: radial-gradient(circle at top, #2563eb55, transparent);
}

.close-btn {
    position: absolute;
    left: 15px;
    top: 15px;
    font-size: 34px;
    cursor: pointer;
    color: var(--muted);
}

/* SCORE */
.modal-score-area {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    margin-top: 25px;
}

.modal-team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

.modal-team img {
    width: 56px;
    height: 56px;
    background: white;
    padding: 6px;
    border-radius: 14px;
}

.modal-team span {
    font-size: 14px;
    font-weight: 700;
}

.modal-score-big {
    font-size: 42px;
    font-weight: 900;
    min-width: 120px;
}

/* INCIDENTS */
.incident-container {
    padding: 22px 16px;
}

.incident-row {
    display: flex;
    font-size: 13px;
    margin-bottom: 10px;
}

.inc-home, .inc-away {
    width: 50%;
}

.inc-home {
    text-align: right;
    padding-right: 10px;
}

.inc-away {
    text-align: left;
    padding-left: 10px;
}

.inc-time {
    font-weight: 800;
    color: var(--live);
}

.goal-name {
    font-weight: 600;
}

/* STATS */
.stat-section {
    padding: 20px 16px 40px;
}

.stat-row {
    margin-bottom: 18px;
}

.stat-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 6px;
}

.stat-bar-bg {
    height: 7px;
    background: #020617;
    border-radius: 999px;
    overflow: hidden;
    display: flex;
}

.stat-bar-home {
    background: linear-gradient(90deg, var(--primary), var(--accent));
}

.stat-bar-away {
    background: linear-gradient(90deg, #f97316, #fb7185);
}

    </style>
</head>
<body>

<header>
    <div class="header-content">
        <div style="font-size: 18px; font-weight: 800;">PRO<span style="color:#64b5f6">SCORE</span></div>
        <button onclick="fetchData()" style="background:rgba(255,255,255,0.2); color:white; border:none; padding:6px 15px; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer;">YENİLƏ</button>
    </div>
</header>

<div class="container" id="matchList">
    <div style="text-align:center; padding:100px; opacity:0.3;">Oyunlar yüklənir...</div>
</div>

<div id="detailsModal">
    <div class="modal-header">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="leagueM" style="font-size:10px; opacity:0.7; text-transform:uppercase; letter-spacing:1px;"></div>
        <div class="modal-score-area">
            <div class="modal-team">
                <img id="logoH" src="">
                <span id="nameH"></span>
            </div>
            <div class="modal-score-big" id="scoreM">0 - 0</div>
            <div class="modal-team">
                <img id="logoA" src="">
                <span id="nameA"></span>
            </div>
        </div>
        <div id="timeM" style="margin-top:15px; font-weight:800; color:#4caf50; background:rgba(255,255,255,0.1); display:inline-block; padding:3px 12px; border-radius:20px; font-size:12px;"></div>
    </div>
    
    <div class="incident-container" id="goalsBox"></div>
    <div class="stat-section" id="statsBox"></div>
</div>

<script>
    const G_URL = "https://script.google.com/macros/s/AKfycbxQV1itjk_W7qC7b3yniMt84-HPrufktquS1x2zpDb_fFb81hYdq1bAmhWsxhPNjleg/exec"; 
    let events = [];

    async function fetchData() {
        try {
            const res = await fetch(G_URL);
            const data = await res.json();
            events = data.events || [];
            render(events);
        } catch (e) { console.error(e); }
    }

    function render(data) {
        const list = document.getElementById("matchList");
        const grouped = data.reduce((acc, ev) => {
            const l = ev.tournament.name;
            if (!acc[l]) acc[l] = { id: ev.tournament.id, matches: [] };
            acc[l].matches.push(ev);
            return acc;
        }, {});

        let html = "";
        for (const league in grouped) {
            html += `
                <div class="league-group">
                    <div class="league-header">
                        <img src="https://www.sofascore.com/api/v1/tournament/${grouped[league].id}/image">
                        <span class="league-title">${league}</span>
                    </div>
                    ${grouped[league].matches.map(m => `
                        <div class="match-card" onclick="openMatch('${m.id}', '${m.homeTeam.id}', '${m.awayTeam.id}', '${m.homeTeam.name}', '${m.awayTeam.name}', '${m.homeScore.current}:${m.awayScore.current}', '${m.status.description}', '${league}')">
                            <div class="time-col">${m.status.description.includes("'") ? m.status.description : 'LIVE'}</div>
                            <div class="teams-col">
                                <div class="team-line">
                                    <div class="team-info"><img class="team-logo" src="https://www.sofascore.com/api/v1/team/${m.homeTeam.id}/image"><span>${m.homeTeam.name}</span></div>
                                    <span class="score-val">${m.homeScore.current}</span>
                                </div>
                                <div class="team-line">
                                    <div class="team-info"><img class="team-logo" src="https://www.sofascore.com/api/v1/team/${m.awayTeam.id}/image"><span>${m.awayTeam.name}</span></div>
                                    <span class="score-val">${m.awayScore.current}</span>
                                </div>
                            </div>
                        </div>`).join("")}
                </div>`;
        }
        list.innerHTML = html || "<center>Canlı oyun yoxdur</center>";
    }

    async function openMatch(id, idH, idA, nameH, nameA, score, time, league) {
        document.getElementById("detailsModal").style.display = "block";
        document.getElementById("logoH").src = `https://www.sofascore.com/api/v1/team/${idH}/image`;
        document.getElementById("logoA").src = `https://www.sofascore.com/api/v1/team/${idA}/image`;
        document.getElementById("nameH").innerText = nameH;
        document.getElementById("nameA").innerText = nameA;
        document.getElementById("scoreM").innerText = score;
        document.getElementById("timeM").innerText = time;
        document.getElementById("leagueM").innerText = league;
        
        document.getElementById("goalsBox").innerHTML = "<center style='opacity:0.5'>Hadisələr yüklənir...</center>";
        document.getElementById("statsBox").innerHTML = "";

        try {
            const resI = await fetch(`${G_URL}?type=incidents&matchId=${id}`);
            const dataI = await resI.json();
            const goals = (dataI.incidents || []).filter(i => i.incidentType === "goal");
            
            let gHtml = "<h4 style='margin-top:0; font-size:12px; color:#888;'>QOLLAR</h4>";
            goals.forEach(g => {
                gHtml += `
                    <div class="incident-row">
                        <div class="inc-home">${g.isHome ? `<span class="goal-name">${g.player ? g.player.name : 'Qol'}</span> <span class="inc-time">${g.time}'</span> ⚽` : ''}</div>
                        <div class="inc-away">${!g.isHome ? `⚽ <span class="inc-time">${g.time}'</span> <span class="goal-name">${g.player ? g.player.name : 'Qol'}</span>` : ''}</div>
                    </div>`;
            });
            document.getElementById("goalsBox").innerHTML = goals.length ? gHtml : "<center style='opacity:0.5'>Hələ qol vurulmayıb</center>";

            const resS = await fetch(`${G_URL}?type=statistics&matchId=${id}`);
            const dataS = await resS.json();
            if (dataS.statistics && dataS.statistics[0]) {
                let sHtml = "<h4 style='font-size:12px; color:#888;'>STATİSTİKA</h4>";
                dataS.statistics[0].groups.flatMap(g => g.statisticsItems).forEach(st => {
                    const hV = parseFloat(st.home), aV = parseFloat(st.away);
                    const hP = (hV / (hV + aV)) * 100;
                    sHtml += `
                        <div class="stat-row">
                            <div class="stat-labels"><span>${st.home}</span><span>${st.name}</span><span>${st.away}</span></div>
                            <div class="stat-bar-bg"><div class="stat-bar-home" style="width:${hP}%"></div><div class="stat-bar-away" style="width:${100-hP}%"></div></div>
                        </div>`;
                });
                document.getElementById("statsBox").innerHTML = sHtml;
            }
        } catch (e) { console.error(e); }
    }

    function closeModal() { document.getElementById("detailsModal").style.display = "none"; }
    fetchData();
    setInterval(fetchData, 30000);
</script>
</body>
</html>
