<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>ProScore Elite | Live Center</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0a0f1f;
  --card:#111c36;
  --primary:#2563eb;
  --accent:#38bdf8;
  --danger:#ef4444;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --border:rgba(255,255,255,0.06);
}

/* 🔒 MODAL AÇIQ OLANDA BODY SCROLL BAĞLA */
body:has(#detailsModal[style*="block"]) {
  overflow: hidden;
}

* { box-sizing:border-box; }

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#0f172a,#020617);
  color:var(--text);
}

/* HEADER */
header {
  position:sticky;
  top:0;
  z-index:1000;
  background:rgba(2,6,23,.9);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.header-content {
  max-width:640px;
  margin:auto;
  padding:14px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.header-content button {
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;
  border:none;
  padding:7px 18px;
  border-radius:999px;
  font-weight:700;
  font-size:12px;
}

/* CONTAINER */
.container {
  max-width:640px;
  margin:auto;
  padding:16px;
}

/* LEAGUE */
.league-group {
  margin-top:20px;
  background:var(--card);
  border-radius:20px;
  border:1px solid var(--border);
  overflow:hidden;
}
.league-header {
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 16px;
  background:linear-gradient(90deg,rgba(37,99,235,.18),transparent);
}
.league-header img { width:20px;height:20px; }
.league-title {
  font-size:11px;
  font-weight:800;
  letter-spacing:1px;
  color:var(--muted);
}

/* MATCH */
.match-card {
  display:grid;
  grid-template-columns:48px 1fr;
  gap:12px;
  padding:14px 16px;
  position:relative;
  cursor:pointer;
}
.match-card:not(:last-child){border-bottom:1px solid var(--border);}
.match-card::after {
  content:"›";
  position:absolute;
  right:16px;
  top:50%;
  transform:translateY(-50%);
  font-size:26px;
  color:var(--muted);
}
.time-col {
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:900;
  color:var(--danger);
}
.teams-col {
  display:flex;
  flex-direction:column;
  gap:8px;
  padding-right:28px;
}
.team-line {
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  min-height:28px;
}
.team-info {
  display:flex;
  align-items:center;
  gap:10px;
}
.team-logo {
  width:24px;
  height:24px;
  object-fit:contain;
  background:#fff;
  padding:3px;
  border-radius:6px;
}
.team-name { font-size:13px;font-weight:600; }
.score-val {
  font-size:16px;
  font-weight:900;
  color:var(--accent);
}

/* MODAL */
#detailsModal {
  display:none;
  position:fixed;
  inset:0;
  z-index:2000;
  background:#020617;
  overflow-y:auto;
}

/* MODAL HEADER */
.modal-header {
  padding:32px 16px 24px;
  text-align:center;
  background:radial-gradient(circle at top,rgba(37,99,235,.35),transparent 65%);
}
.close-btn {
  position:absolute;
  left:16px;
  top:16px;
  font-size:34px;
  color:var(--muted);
}
.modal-score-area {
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:16px;
  margin-top:28px;
}
.modal-team {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
.modal-team img {
  width:56px;
  height:56px;
  background:#fff;
  padding:6px;
  border-radius:14px;
}
.modal-score-big {
  font-size:44px;
  font-weight:900;
  min-width:120px;
}

/* INCIDENTS */
.incident-container { padding:24px 16px; }
.incident-row {
  display:grid;
  grid-template-columns:1fr 1fr;
  font-size:13px;
  margin-bottom:12px;
}
.inc-home { text-align:right;padding-right:12px; }
.inc-away { text-align:left;padding-left:12px; }
.inc-time { font-weight:800;color:var(--danger); }

/* STATS */
.stat-section { padding:24px 16px 40px; }
.stat-row { margin-bottom:20px; }
.stat-labels {
  display:grid;
  grid-template-columns:40px 1fr 40px;
  font-size:11px;
  font-weight:700;
  color:var(--muted);
}
.stat-bar-bg {
  height:7px;
  background:#020617;
  border-radius:999px;
  overflow:hidden;
  display:flex;
}
.stat-bar-home {
  background:linear-gradient(90deg,var(--primary),var(--accent));
}
.stat-bar-away {
  background:linear-gradient(90deg,#f97316,#fb7185);
}
</style>
</head>

<body>

<script>
    const G_URL = "https://script.google.com/macros/s/AKfycbxQV1itjk_W7qC7b3yniMt84-HPrufktquS1x2zpDb_fFb81hYdq1bAmhWsxhPNjleg/exec"; 
    let events = [];

    async function fetchData() {
        try {
            const res = await fetch(G_URL);
            const data = await res.json();
            events = data.events || [];
            render(events);
        } catch (e) { console.error(e); }
    }

    function render(data) {
        const list = document.getElementById("matchList");
        const grouped = data.reduce((acc, ev) => {
            const l = ev.tournament.name;
            if (!acc[l]) acc[l] = { id: ev.tournament.id, matches: [] };
            acc[l].matches.push(ev);
            return acc;
        }, {});

        let html = "";
        for (const league in grouped) {
            html += `
                <div class="league-group">
                    <div class="league-header">
                        <img src="https://www.sofascore.com/api/v1/tournament/${grouped[league].id}/image">
                        <span class="league-title">${league}</span>
                    </div>
                    ${grouped[league].matches.map(m => `
                        <div class="match-card" onclick="openMatch('${m.id}', '${m.homeTeam.id}', '${m.awayTeam.id}', '${m.homeTeam.name}', '${m.awayTeam.name}', '${m.homeScore.current}:${m.awayScore.current}', '${m.status.description}', '${league}')">
                            <div class="time-col">${m.status.description.includes("'") ? m.status.description : 'LIVE'}</div>
                            <div class="teams-col">
                                <div class="team-line">
                                    <div class="team-info"><img class="team-logo" src="https://www.sofascore.com/api/v1/team/${m.homeTeam.id}/image"><span>${m.homeTeam.name}</span></div>
                                    <span class="score-val">${m.homeScore.current}</span>
                                </div>
                                <div class="team-line">
                                    <div class="team-info"><img class="team-logo" src="https://www.sofascore.com/api/v1/team/${m.awayTeam.id}/image"><span>${m.awayTeam.name}</span></div>
                                    <span class="score-val">${m.awayScore.current}</span>
                                </div>
                            </div>
                        </div>`).join("")}
                </div>`;
        }
        list.innerHTML = html || "<center>Canlı oyun yoxdur</center>";
    }

    async function openMatch(id, idH, idA, nameH, nameA, score, time, league) {
        document.getElementById("detailsModal").style.display = "block";
        document.getElementById("logoH").src = `https://www.sofascore.com/api/v1/team/${idH}/image`;
        document.getElementById("logoA").src = `https://www.sofascore.com/api/v1/team/${idA}/image`;
        document.getElementById("nameH").innerText = nameH;
        document.getElementById("nameA").innerText = nameA;
        document.getElementById("scoreM").innerText = score;
        document.getElementById("timeM").innerText = time;
        document.getElementById("leagueM").innerText = league;
        
        document.getElementById("goalsBox").innerHTML = "<center style='opacity:0.5'>Hadisələr yüklənir...</center>";
        document.getElementById("statsBox").innerHTML = "";

        try {
            const resI = await fetch(`${G_URL}?type=incidents&matchId=${id}`);
            const dataI = await resI.json();
            const goals = (dataI.incidents || []).filter(i => i.incidentType === "goal");
            
            let gHtml = "<h4 style='margin-top:0; font-size:12px; color:#888;'>QOLLAR</h4>";
            goals.forEach(g => {
                gHtml += `
                    <div class="incident-row">
                        <div class="inc-home">${g.isHome ? `<span class="goal-name">${g.player ? g.player.name : 'Qol'}</span> <span class="inc-time">${g.time}'</span> ⚽` : ''}</div>
                        <div class="inc-away">${!g.isHome ? `⚽ <span class="inc-time">${g.time}'</span> <span class="goal-name">${g.player ? g.player.name : 'Qol'}</span>` : ''}</div>
                    </div>`;
            });
            document.getElementById("goalsBox").innerHTML = goals.length ? gHtml : "<center style='opacity:0.5'>Hələ qol vurulmayıb</center>";

            const resS = await fetch(`${G_URL}?type=statistics&matchId=${id}`);
            const dataS = await resS.json();
            if (dataS.statistics && dataS.statistics[0]) {
                let sHtml = "<h4 style='font-size:12px; color:#888;'>STATİSTİKA</h4>";
                dataS.statistics[0].groups.flatMap(g => g.statisticsItems).forEach(st => {
                    const hV = parseFloat(st.home), aV = parseFloat(st.away);
                    const hP = (hV / (hV + aV)) * 100;
                    sHtml += `
                        <div class="stat-row">
                            <div class="stat-labels"><span>${st.home}</span><span>${st.name}</span><span>${st.away}</span></div>
                            <div class="stat-bar-bg"><div class="stat-bar-home" style="width:${hP}%"></div><div class="stat-bar-away" style="width:${100-hP}%"></div></div>
                        </div>`;
                });
                document.getElementById("statsBox").innerHTML = sHtml;
            }
        } catch (e) { console.error(e); }
    }

    function closeModal() { document.getElementById("detailsModal").style.display = "none"; }
    fetchData();
    setInterval(fetchData, 30000);
</script>

</body>
</html>
