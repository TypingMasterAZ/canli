<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProScore Elite | Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617; --card: rgba(30, 41, 59, 0.8);
            --green: #22c55e; --red: #f43f5e; --text: #f8fafc;
            --muted: #94a3b8; --border: rgba(255, 255, 255, 0.1); --accent: #38bdf8;
        }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }
        header { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .filters { padding: 15px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
        .search-box, .league-select { width: 100%; padding: 12px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); color: #fff; outline: none; }
        .container { padding: 10px; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
        .match-card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); }
        .match-body { display: flex; align-items: center; justify-content: space-between; }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .team-logo { width: 45px; height: 45px; object-fit: contain; margin-bottom: 8px; border-radius: 50%; background: #fff; padding: 3px; }
        .score { font-size: 26px; font-weight: 800; }
        .minute-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: var(--red); color: #fff; font-weight: 700; }
        .goals-list { display: flex; justify-content: space-between; margin-top: 12px; font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1 style="font-size:18px; font-weight:800; color:var(--accent); margin:0">PROSCORE ELITE</h1>
    <button onclick="fetchData()" style="background:var(--accent); border:none; color:#000; padding:6px 15px; border-radius:8px; font-weight:bold; cursor:pointer">YENİLƏ</button>
</header>

<div class="filters">
    <input type="text" id="searchInput" class="search-box" placeholder="Klub axtar...">
    <select id="leagueFilter" class="league-select">
        <option value="all">BÜTÜN LİQALAR</option>
    </select>
</div>

<div class="container" id="matchContainer"></div>

<script>
    const API_URL = "https://canli-neticeler.onrender.com";
    let allMatches = [];

    async function fetchData() {
        try {
            const res = await fetch(`${API_URL}/live-scores?t=${Date.now()}`);
            allMatches = await res.json();
            updateLeagueFilter();
            renderMatches();
        } catch (e) { console.error("Xəta:", e); }
    }

    function updateLeagueFilter() {
        const select = document.getElementById("leagueFilter");
        const leagues = [...new Set(allMatches.map(m => m.displayLeague))];
        let html = '<option value="all">BÜTÜN LİQALAR</option>';
        leagues.forEach(l => html += `<option value="${l}">${l}</option>`);
        select.innerHTML = html;
    }

    function renderMatches() {
        const container = document.getElementById("matchContainer");
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const selectedLeague = document.getElementById("leagueFilter").value;

        const filtered = allMatches.filter(m => {
            const search = m.home.toLowerCase().includes(searchTerm) || m.away.toLowerCase().includes(searchTerm);
            const league = selectedLeague === "all" || m.displayLeague === selectedLeague;
            return search && league;
        });

        container.innerHTML = filtered.map(m => {
            // LOQO SİSTEMİ:
            // 1. Sofascore-dan yoxlayır
            // 2. Tapılmasa Google Favicon xidmətindən axtarır
            // 3. O da olmasa baş hərfləri göstərir
            const logoUrl = (id, name) => `https://api.sofascore.app/api/v1/team/${id}/image`;
            const googleLogo = (name) => `https://www.google.com/s2/favicons?domain=${name.replace(/\s/g, '')}.com&sz=128`;
            const fallback = (name) => `https://ui-avatars.com/api/?name=${name}&background=38bdf8&color=fff&bold=true`;

            return `
                <div class="match-card">
                    <div style="text-align:center; font-size:10px; color:var(--accent); margin-bottom:8px; font-weight:bold">${m.displayLeague}</div>
                    <div class="match-body">
                        <div class="team-side">
                            <img src="${logoUrl(m.homeId, m.home)}" class="team-logo" 
                                 onerror="this.onerror=null; this.src='${googleLogo(m.home)}'; this.onerror=function(){this.src='${fallback(m.home)}'};">
                            <div style="font-weight:700; font-size:13px; text-align:center">${m.home}</div>
                        </div>
                        <div style="text-align:center; flex: 0 0 90px;">
                            <div class="score">${m.score.home} - ${m.score.away}</div>
                            <div class="minute-badge">${m.minute}</div>
                        </div>
                        <div class="team-side">
                            <img src="${logoUrl(m.awayId, m.away)}" class="team-logo" 
                                 onerror="this.onerror=null; this.src='${googleLogo(m.away)}'; this.onerror=function(){this.src='${fallback(m.away)}'};">
                            <div style="font-weight:700; font-size:13px; text-align:center">${m.away}</div>
                        </div>
                    </div>
                    ${m.scorers.length > 0 ? `
                    <div class="goals-list">
                        <div style="flex:1">${m.scorers.filter(s => s.side === 1).map(s => `⚽ ${s.name} ${s.time}'`).join("<br>")}</div>
                        <div style="flex:1; text-align:right">${m.scorers.filter(s => s.side === 2).map(s => `${s.name} ${s.time}' ⚽`).join("<br>")}</div>
                    </div>` : ''}
                </div>
            `;
        }).join("");
    }

    document.getElementById("searchInput").addEventListener("input", renderMatches);
    document.getElementById("leagueFilter").addEventListener("change", renderMatches);
    fetchData();
    setInterval(fetchData, 60000);
</script>
</body>
</html>
