<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProScore Elite | Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617; --card: rgba(30, 41, 59, 0.7);
            --green: #22c55e; --red: #f43f5e; --text: #f8fafc;
            --muted: #94a3b8; --border: rgba(255, 255, 255, 0.1); --accent: #38bdf8;
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); 
            background-image: radial-gradient(circle at top right, #1e293b, #020617); background-attachment: fixed;
        }
        header {
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(12px); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
        }
        .lang-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .lang-btn.active { background: var(--accent); color: #000; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .match-card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
        .match-body { display: flex; align-items: center; justify-content: space-between; }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .team-logo { width: 50px; height: 50px; object-fit: contain; margin-bottom: 10px; }
        .score-box { flex: 0 0 100px; text-align: center; }
        .score { font-size: 28px; font-weight: 800; }
        .minute-badge { font-size: 10px; padding: 4px 10px; border-radius: 20px; background: #000; color: #fff; margin-top: 5px; display: inline-block; }
        .live-bg { background: var(--red); }
    </style>
</head>
<body>

<header>
    <h1 style="font-size:18px; font-weight:800; color:var(--accent)">PROSCORE ELITE</h1>
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="location.reload()">YENİLƏ</button>
    </div>
</header>

<div class="container" id="matchContainer"></div>

<script>
    async function fetchData() {
        const container = document.getElementById("matchContainer");
        try {
            // Sənin Render linkin (sonuna vaxt əlavə edirik ki, keşləməsin)
            const res = await fetch(`https://canli-neticeler.onrender.com/live-scores?t=${Date.now()}`);
            const matches = await res.json();

            if (matches.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:var(--muted)">Hazırda canlı oyun yoxdur.</div>`;
                return;
            }

            container.innerHTML = matches.map(m => `
                <div class="match-card">
                    <div style="text-align:center; font-size:11px; color:var(--accent); margin-bottom:10px; font-weight:bold">${m.displayLeague}</div>
                    <div class="match-body">
                        <div class="team-side">
                            <img src="${m.homeLogo}" class="team-logo" onerror="this.src='https://via.placeholder.com/50?text=?'">
                            <div style="font-weight:700; font-size:13px; text-align:center">${m.home}</div>
                        </div>
                        <div class="score-box">
                            <div class="score">${m.score.home} - ${m.score.away}</div>
                            <div class="minute-badge ${m.minute === 'LIVE' ? 'live-bg' : ''}">${m.minute}</div>
                        </div>
                        <div class="team-side">
                            <img src="${m.awayLogo}" class="team-logo" onerror="this.src='https://via.placeholder.com/50?text=?'">
                            <div style="font-weight:700; font-size:13px; text-align:center">${m.away}</div>
                        </div>
                    </div>
                </div>
            `).join("");
        } catch (e) {
            container.innerHTML = `<div style="text-align:center; color:var(--red)">Xəta baş verdi.</div>`;
        }
    }

    fetchData();
    setInterval(fetchData, 60000); // Hər dəqiqə yenilə
</script>
</body>
</html>
